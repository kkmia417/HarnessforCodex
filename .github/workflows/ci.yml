name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    name: Validate skills and CLI
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Validate root skills with CLI
        run: codex-harness validate .

      - name: Validate root skills with repository validator
        run: python skills/codex-harness/scripts/validate_codex_harness.py .

      - name: Validate examples
        run: |
          codex-harness validate examples/python-api
          codex-harness validate examples/react-app
          codex-harness validate examples/oss-maintainer-workflow

      - name: Compile Python sources
        run: python -m compileall src skills tests
