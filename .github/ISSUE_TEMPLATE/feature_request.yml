name: Feature request
description: Suggest a skill, CLI command, validation rule, example, or packaging improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: workflow
    attributes:
      label: Workflow
      description: What repeated Codex workflow should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: How could we test that this works?
