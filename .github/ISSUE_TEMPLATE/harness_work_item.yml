name: Harness work item
description: Track a missing or evolving Codex Harness capability
title: "[Harness] "
labels:
  - harness
body:
  - type: textarea
    id: capability
    attributes:
      label: Capability
      description: What capability should be added or improved?
    validations:
      required: true
  - type: textarea
    id: upstream-gap
    attributes:
      label: Upstream gap
      description: What is missing compared with the upstream Harness idea?
    validations:
      required: true
  - type: textarea
    id: implementation
    attributes:
      label: Implementation scope
      description: Which files, skills, scripts, or docs should change?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true before this issue is closed?
      placeholder: |
        - [ ] ...
        - [ ] validation passes
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: Which commands or scenario checks should run?
      placeholder: |
        python .\skills\codex-harness\scripts\validate_codex_harness.py .
    validations:
      required: false
