name: Bug report
description: Report a broken command, invalid skill, packaging issue, or documentation bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What failed, and what did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include commands, prompts, repository layout, and output.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: The release version or commit SHA you tested.
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, Codex surface, and install method.
